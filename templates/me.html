{% extends "base.html" %}
{% block title %}个人中心 · 泰玄小站{% endblock %}

{% block content %}
<div class="me-container">
    <h1>个人中心</h1>

    <div id="meLoading" class="auth-loading">加载中...</div>

    <div id="meContent" style="display:none">
        <section class="me-section">
            <h2>账号信息</h2>
            <p>邮箱:<span id="meEmail">-</span></p>
            <p>昵称:<span id="meNickname">-</span></p>
            <p>角色:<span id="meRole">-</span></p>
            <p>注册时间:<span id="meCreated">-</span></p>
        </section>

        <section class="me-section">
            <h2>我的收藏(<span id="meFavCount">0</span>)</h2>
            <div id="meFavList" class="me-fav-list">
                <p class="empty-hint">加载中...</p>
            </div>
        </section>

        <section class="me-section">
            <h2>操作</h2>
            <button id="logoutBtn" class="btn-secondary">登出</button>
            <a href="/" class="btn-link">返回首页</a>
        </section>
    </div>

    <div id="meLoginPrompt" style="display:none">
        <p>请先 <a href="/login">登录</a> 或 <a href="/register">注册</a>。</p>
    </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
async function loadMe() {
    const token = TaixuanAuth.getToken();
    if (!token) {
        document.getElementById('meLoading').style.display = 'none';
        document.getElementById('meLoginPrompt').style.display = 'block';
        return;
    }

    try {
        const meResp = await fetch('/api/v2/auth/me', {
            headers: {'Authorization': 'Bearer ' + token},
        });
        if (!meResp.ok) {
            // Token expired or invalid
            TaixuanAuth.clear();
            document.getElementById('meLoading').style.display = 'none';
            document.getElementById('meLoginPrompt').style.display = 'block';
            return;
        }
        const me = await meResp.json();
        document.getElementById('meEmail').textContent = me.email;
        document.getElementById('meNickname').textContent = me.nickname || '-';
        document.getElementById('meRole').textContent = me.role || 'user';
        document.getElementById('meCreated').textContent = me.created_at || '-';

        // Load favorites
        const favResp = await fetch('/api/v2/favorites?limit=50', {
            headers: {'Authorization': 'Bearer ' + token},
        });
        const favData = await favResp.json();
        document.getElementById('meFavCount').textContent = favData.count || 0;
        const list = document.getElementById('meFavList');
        if (!favData.items || favData.items.length === 0) {
            list.innerHTML = '<p class="empty-hint">还没有收藏。在解读页点 ★ 收藏喜欢的解读。</p>';
        } else {
            list.innerHTML = '';
            favData.items.forEach((fav) => {
                const card = document.createElement('div');
                card.className = 'me-fav-card';
                card.innerHTML = `
                    <div class="me-fav-meta">
                        <span class="liupai-tag">${fav.liupai || 'unknown'}</span>
                        <span class="time-tag">${fav.created_at || ''}</span>
                    </div>
                    <div class="me-fav-question">${fav.question || '(无问题)'}</div>
                    ${fav.note ? `<div class="me-fav-note">笔记: ${fav.note}</div>` : ''}
                    <button class="btn-tiny btn-delete" data-fav-id="${fav.favorite_id}">删除</button>
                `;
                list.appendChild(card);
            });
            // Wire delete buttons
            list.querySelectorAll('.btn-delete').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const favId = btn.dataset.favId;
                    if (!confirm('确认删除这条收藏?')) return;
                    const resp = await fetch('/api/v2/favorites/' + favId, {
                        method: 'DELETE',
                        headers: {'Authorization': 'Bearer ' + token},
                    });
                    if (resp.ok) {
                        loadMe();  // reload
                    } else {
                        alert('删除失败');
                    }
                });
            });
        }

        document.getElementById('meLoading').style.display = 'none';
        document.getElementById('meContent').style.display = 'block';
    } catch (err) {
        document.getElementById('meLoading').textContent = '加载失败: ' + err.message;
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    const token = TaixuanAuth.getToken();
    if (!token) {
        TaixuanAuth.clear();
        window.location.href = '/';
        return;
    }
    try {
        await fetch('/api/v2/auth/logout', {
            method: 'POST',
            headers: {'Authorization': 'Bearer ' + token},
        });
    } catch (e) { /* ignore */ }
    TaixuanAuth.clear();
    window.location.href = '/';
});

loadMe();
</script>
{% endblock %}
