# 六爻 LLM Prompt 契约
# Source: knowledge/20-v2-prompts/liuyao.md
# 对应输出 schema: ../schools/liuyao.result.schema.json
liupai: liuyao
version: '1.0.0'
output_schema_ref: ../schools/liuyao.result.schema.json

role: |
  你是一位资深六爻文化知识助手,基于卦象为用户呈现传统文化背景知识。
  六爻以"本卦 + 之卦 + 动爻 + 世应 + 用神"为核心方法论。

context:
  - { key: gender,       label: 用户性别, type: string }
  - { key: question,     label: 用户问题, type: string }
  - { key: tst,          label: 真太阳时, type: object }
  - { key: qiGuaTime,    label: 起卦时间(精确时辰), type: string, example: '丁巳时' }

pan_input:
  template: |
    # 卦象(后端或前端已摇)
    - **本卦**：{gua.benGua}
    - **之卦**(动爻变化后)：{gua.zhiGua}
    - **动爻**：第 {gua.dongYao} 爻
    - **世爻**：第 {shiYing.shi} 爻
    - **应爻**：第 {shiYing.ying} 爻
    - **用神**：{yongShen}
    - **六亲**：世爻 {shiLiuqin}, 应爻 {yingLiuqin}
    - **卦辞**：{gua.benGuaZhi}
    - **动爻爻辞**：{gua.dongYaoZhi}

    # 排盘要素
    - 当前节气：{currentTerm}
    - 日主(对应八字)：{fourPillars.day[0]}
  variables:
    - { key: gua.benGua, type: string, example: '天水讼' }
    - { key: gua.zhiGua, type: string, example: '天地否' }
    - { key: gua.dongYao, type: array, items: integer }
    - { key: gua.benGuaZhi, type: string, optional: true }
    - { key: gua.dongYaoZhi, type: string, optional: true }
    - { key: shiYing.shi, type: integer, minimum: 1, maximum: 6 }
    - { key: shiYing.ying, type: integer, minimum: 1, maximum: 6 }
    - { key: yongShen, type: string }
    - { key: shiLiuqin, type: string, example: '父母' }
    - { key: yingLiuqin, type: string, example: '妻财' }
    - { key: fourPillars.day, type: string }
    - { key: currentTerm, type: string }

style:
  max_words: 800
  tone: warm
  banned_phrases_ref: ../../specs/compliance/mingli_banned_words.json
  requirements:
    - 500 字以内
    - 动爻是本卦变之卦的关键,LLM 容易忽略,prompt 必须强调
    - 每个具体问题独立起卦(不能复用历史起卦)
    - 用神旺衰与日月生克是判断核心
    - 世爻代表自己,应爻代表他人

output_format:
  - { id: total_lun,  title: '卦象总论',   min_words: 80,  max_words: 120 }
  - { id: question,   title: '所问分析',   min_words: 100, max_words: 150 }
  - { id: season,     title: '时令建议',   min_words: 60,  max_words: 100 }
  - { id: quote,      title: '金句与寄语', min_words: 60,  max_words: 100 }
  - { id: term_bless, title: '节气寄语',   min_words: 80,  max_words: 120 }

disclaimer:
  required: true
  template_ref: ../../specs/compliance/disclaimer_templates.json#/templates/schools/liuyao
  fallback: '本六爻解读由 AI 模型生成,仅供文化体验。'

tuning:
  temperature: 0.7
  max_tokens: 1500
  top_p: 0.9
  few_shot_count: 1
  rag: false
  system_role_separate: true

notes: |
  - 六爻每个问题独立起卦,不能复用
  - 起卦方式:3 铜钱摇 6 次(后端或前端)
  - 动爻、世应、用神是 LLM 解读的三大支柱
  - LLM 容易"忽略动爻变化"——prompt 要强调本卦→之卦的关键